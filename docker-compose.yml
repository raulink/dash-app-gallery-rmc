services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ingresos_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"  # PUERTO DIFERENTE (5433 en lugar de 5432 o 5435)

  # Añadir aplicacion python dash en la carpeta app
  app:
    build:
      context: .
      #dockerfile: Dockerfile
    command: python /app/app.py
    #command: pip install psycopg2-binary && python /app/app.py
    ports:
      - "8091:8080"
    #env_file:
    # - .env
    volumes:
      - ./app:/app
  

